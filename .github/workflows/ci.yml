# Sprint 3: typecheck + coverage gate
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 20
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test (main suites)
        run: npm run test -- --maxWorkers=50% --testPathIgnorePatterns=app/api/research/process/__tests__/process.test.ts
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          NEXTAUTH_SECRET: ci-secret
          NEXTAUTH_URL: http://localhost:3000
          PROVIDER_KEY_ENCRYPTION_SECRET: ci-provider-key-secret-1234567890
          GEMINI_API_KEY: ci-gemini-key

      - name: Test (research suite, serial)
        run: npm run test -- app/api/research/process/__tests__/process.test.ts --runInBand
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          NEXTAUTH_SECRET: ci-secret
          NEXTAUTH_URL: http://localhost:3000
          PROVIDER_KEY_ENCRYPTION_SECRET: ci-provider-key-secret-1234567890
          GEMINI_API_KEY: ci-gemini-key
